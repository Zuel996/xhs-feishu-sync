# ── 小红书监控账号配置 ──
# 分为自有账号和竞品账号两类

own_accounts:
  # 替换为你的小红书账号信息
  # account_id: 唯一标识，用于 CSV 导入目录名
  # xhs_user_id: 小红书用户 ID（从个人主页 URL 获取）
  # xhs_username: 小红书用户名
  # display_name: 在飞书表格中显示的名称
  - account_id: "your_account"
    xhs_user_id: "请填写你的小红书用户ID"
    xhs_username: "请填写用户名"
    display_name: "请填写显示名称"
    competitor: false

competitor_accounts: []
  # 示例:
  # - account_id: "competitor_a"
  #   xhs_user_id: "5f3a2b1c0000000001005678"
  #   xhs_username: "竞品A"
  #   display_name: "竞品A"
  #   competitor: true
